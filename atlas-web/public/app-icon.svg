<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <linearGradient id="grad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#7CFFC4"/>
      <stop offset="55%" stop-color="#00FF99"/>
      <stop offset="100%" stop-color="#00C97A"/>
    </linearGradient>
    <filter id="blockGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="1.1" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="haloGlow" x="-75%" y="-75%" width="250%" height="250%">
      <feGaussianBlur stdDeviation="1.8" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <clipPath id="iconClip">
      <rect width="32" height="32" rx="7"/>
    </clipPath>
  </defs>

  <g clip-path="url(#iconClip)">
  <rect width="32" height="32" rx="7" fill="#060612"/>

  <!-- outer ring scaled to fill full icon (was x=3, 26×26 → x=0, 32×32) -->
  <rect x="0" y="0" width="32" height="32" rx="7" fill="#00D985" opacity="0.14" filter="url(#haloGlow)"/>
  <!-- middle ring: 21.3 × 32/26 = 26.22 -->
  <rect x="2.89" y="2.89" width="26.22" height="26.22" rx="5.72" fill="#00D985" opacity="0.26" filter="url(#haloGlow)"/>

  <!-- inner green block: 16.5 × 32/26 = 20.31 -->
  <rect x="5.85" y="5.85" width="20.31" height="20.31" rx="4.43" fill="url(#grad)" filter="url(#blockGlow)"/>

  <!-- chevrons: all coords scaled by 32/26 from center (16,16) -->
  <path d="M 9.23 9.54 L 13.05 11.45 L 9.23 13.35" fill="none" stroke="#060612" stroke-width="1.92"
        stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M 22.65 13.78 L 14.03 18.46 L 22.65 23.14" fill="none" stroke="#060612" stroke-width="2.95"
        stroke-linecap="round" stroke-linejoin="round"/>
  </g>
</svg>
