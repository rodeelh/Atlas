<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <linearGradient id="grad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#7CFFC4"/>
      <stop offset="55%" stop-color="#00FF99"/>
      <stop offset="100%" stop-color="#00C97A"/>
    </linearGradient>
    <linearGradient id="flash" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#D6FFEC" stop-opacity="1"/>
      <stop offset="60%" stop-color="#7CFFC4" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#7CFFC4" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <g transform-origin="16 16">
    <rect width="32" height="32" rx="7" fill="url(#grad)"/>
    <rect width="32" height="32" rx="7" fill="#FFFFFF" opacity="0">
      <animate attributeName="opacity" values="0;0.15;0" dur="2.6s" repeatCount="indefinite"
               calcMode="spline" keySplines="0.4 0 0.2 1; 0.4 0 0.2 1" keyTimes="0;0.5;1"/>
    </rect>
    <animateTransform attributeName="transform" type="scale" values="1;1.025;1" dur="2.6s"
                      repeatCount="indefinite" calcMode="spline"
                      keySplines="0.4 0 0.2 1; 0.4 0 0.2 1" keyTimes="0;0.5;1" additive="sum"/>
  </g>

  <path d="M 5.33 5.82 L 11.34 8.82 L 5.33 11.83" fill="none" stroke="#060612" stroke-width="3.02"
        stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M 26.47 12.51 L 12.90 19.88 L 26.47 27.24" fill="none" stroke="#060612" stroke-width="4.66"
        stroke-linecap="round" stroke-linejoin="round"/>

  <rect width="32" height="32" rx="7" fill="url(#flash)" opacity="0">
    <animate attributeName="opacity" values="0;0;0.5;0;0" keyTimes="0;0.45;0.60;0.85;1"
             dur="3.8s" repeatCount="indefinite"
             calcMode="spline"
             keySplines="0.4 0 0.6 1; 0.25 0.8 0.3 1; 0.4 0 0.6 1; 0.4 0 0.6 1"/>
  </rect>
</svg>
