			shellPath = /bin/sh;
			shellScript = "set -e\n# ── Web UI build (atlas-web → AtlasRuntimeService bundle source) ──────────────\nATLAS_WEB_DIR=\"${SRCROOT}/../atlas-web\"\nexport NVM_DIR=\"$HOME/.nvm\"\n[ -s \"$NVM_DIR/nvm.sh\" ] && source \"$NVM_DIR/nvm.sh\" --no-use\nexport PATH=\"/opt/homebrew/bin:/usr/local/bin:$PATH\"\ncd \"$ATLAS_WEB_DIR\"\n[ ! -d node_modules ] && npm install --silent\nnpm run build\n# ── Daemon build ──────────────────────────────────────────────────────────────\nATLAS_CORE_DIR=\"${SRCROOT}/../atlas-core\"\nSWIFT_CONFIG=$( [ \"$CONFIGURATION\" = \"Release\" ] && echo \"release\" || echo \"debug\" )\nINFOPLIST=\"${ATLAS_CORE_DIR}/Sources/AtlasRuntimeService/Info.plist\"\nENTITLEMENTS_TEMPLATE=\"${ATLAS_CORE_DIR}/Sources/AtlasRuntimeService/AtlasRuntimeService.entitlements\"\nRESOLVED_ENTITLEMENTS=\"${TARGET_TEMP_DIR}/AtlasRuntimeService.entitlements\"\nAPP_ID_PREFIX=\"${AppIdentifierPrefix}\"\nSIGNING_ID=\"${CODE_SIGN_IDENTITY:--}\"\ncd \"$ATLAS_CORE_DIR\"\nBIN_DIR=$(swift build -c \"$SWIFT_CONFIG\" --product AtlasRuntimeService --show-bin-path 2>/dev/null)\n# Embed Info.plist in the binary's __TEXT,__info_plist section at link time.\n# This gives AtlasRuntimeService a stable CFBundleIdentifier so macOS TCC\n# keys Automation permissions to com.rxalabs.atlas.runtime instead of the\n# binary content hash (which changes on every rebuild).\nswift build -c \"$SWIFT_CONFIG\" --product AtlasRuntimeService \\\n    -Xlinker -sectcreate -Xlinker __TEXT -Xlinker __info_plist -Xlinker \"$INFOPLIST\"\ncp \"${BIN_DIR}/AtlasRuntimeService\" \"${BUILT_PRODUCTS_DIR}/AtlasRuntimeService\"\npython3 - <<'PY' \"$ENTITLEMENTS_TEMPLATE\" \"$RESOLVED_ENTITLEMENTS\" \"$APP_ID_PREFIX\" \"$SIGNING_ID\"\nfrom pathlib import Path\nimport sys\nsrc, dst, prefix, signing_id = sys.argv[1:5]\ntext = Path(src).read_text(encoding='utf-8')\ntext = text.replace('__ATLAS_APP_IDENTIFIER_PREFIX__', prefix)\ntext = text.replace('$(AppIdentifierPrefix)', prefix)\nif not prefix or signing_id == '-':\n    restricted = \"\"\"    <key>keychain-access-groups</key>\\n    <array>\\n        <string>com.projectatlas.shared</string>\\n    </array>\\n\"\"\"\n    prefixed = f\"\"\"    <key>keychain-access-groups</key>\\n    <array>\\n        <string>{prefix}com.projectatlas.shared</string>\\n    </array>\\n\"\"\"\n    text = text.replace(prefixed, '').replace(restricted, '')\nPath(dst).write_text(text, encoding='utf-8')\nPY\n# Sign the daemon binary. Uses the project signing identity when set\n# (stable TCC across rebuilds); falls back to ad-hoc (-) otherwise.\ncodesign --sign \"$SIGNING_ID\" --entitlements \"$RESOLVED_ENTITLEMENTS\" --force \"${BUILT_PRODUCTS_DIR}/AtlasRuntimeService\"\nBUNDLE_NAME=\"AtlasCorePackage_AtlasRuntimeService.bundle\"\nrm -rf \"${BUILT_PRODUCTS_DIR}/${BUNDLE_NAME}\"\ncp -R \"${BIN_DIR}/${BUNDLE_NAME}\" \"${BUILT_PRODUCTS_DIR}/${BUNDLE_NAME}\"\n";
