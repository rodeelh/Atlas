name: AtlasApp
options:
  createIntermediateGroups: true
  deploymentTarget:
    macOS: "14.0"

packages:
  atlas-core:
    path: ../atlas-core
  atlas-logging:
    path: ../atlas-logging
  atlas-memory:
    path: ../atlas-memory
  atlas-network:
    path: ../atlas-network
  atlas-skills:
    path: ../atlas-skills

settings:
  base:
    SWIFT_VERSION: "5.10"
    MACOSX_DEPLOYMENT_TARGET: "14.0"
    CURRENT_PROJECT_VERSION: "1"
    MARKETING_VERSION: "0.1.0"

targets:
  AtlasApp:
    type: application
    platform: macOS
    deploymentTarget: "14.0"
    sources:
      - path: Sources/AtlasApp
    dependencies:
      - package: atlas-core
        product: AtlasCore
      - package: atlas-logging
        product: AtlasShared
      - package: atlas-logging
        product: AtlasLogging
      - package: atlas-network
        product: AtlasNetwork
      - package: atlas-skills
        product: AtlasSkills
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.projectatlas.app
        PRODUCT_NAME: AtlasApp
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_CFBundleDisplayName: Project Atlas
        INFOPLIST_KEY_CFBundleName: Project Atlas
        INFOPLIST_KEY_LSApplicationCategoryType: public.app-category.developer-tools
        INFOPLIST_KEY_NSHumanReadableCopyright: ""
        CODE_SIGN_STYLE: Automatic
        CODE_SIGNING_ALLOWED: NO
        ASSETCATALOG_COMPILER_APPICON_NAME: ""
        SWIFT_EMIT_LOC_STRINGS: NO
      configs:
        Debug:
          ENABLE_TESTABILITY: YES
        Release:
          SWIFT_COMPILATION_MODE: wholemodule

  AtlasAppTests:
    type: bundle.unit-test
    platform: macOS
    deploymentTarget: "14.0"
    sources:
      - path: Tests/AtlasAppTests
    dependencies:
      - target: AtlasApp
      - package: atlas-logging
        product: AtlasShared
      - package: atlas-memory
        product: AtlasMemory
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.projectatlas.app.tests
        PRODUCT_NAME: AtlasAppTests
        GENERATE_INFOPLIST_FILE: YES
        CODE_SIGN_STYLE: Automatic
        CODE_SIGNING_ALLOWED: NO
        BUNDLE_LOADER: "$(TEST_HOST)"
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/AtlasApp.app/Contents/MacOS/AtlasApp"

schemes:
  AtlasApp:
    build:
      targets:
        AtlasApp: all
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - name: AtlasAppTests
    profile:
      config: Release
    analyze:
      config: Debug
    archive:
      config: Release
